<!DOCTYPE html>
<html>
<head>

<title>Edit Patient</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="container mt-4">

<h2>Edit Patient</h2>

<form method="POST">

<input
class="form-control mb-2"
name="full_name"
value="{{patient[1]}}">

<input
class="form-control mb-2"
type="date"
name="dob"
value="{{patient[2]}}">

<input
class="form-control mb-2"
name="email"
value="{{patient[3]}}">

<input
class="form-control mb-2"
name="glucose"
value="{{patient[4]}}">

<input
class="form-control mb-2"
name="haemoglobin"
value="{{patient[5]}}">

<input
class="form-control mb-2"
name="cholesterol"
value="{{patient[6]}}">

<button class="btn btn-primary">
Update
</button>

</form>

</body>
</html>
